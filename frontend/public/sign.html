<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Book A Ride</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  .wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .brand {
    color: #D4AF37;
    font-family: "Arial Black", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 900;
    font-size: 18vw;
    line-height: 0.9;
    letter-spacing: -0.03em;
    white-space: nowrap;
    text-align: center;
    text-shadow: 0 4px 20px rgba(212,175,55,0.3);
  }
  .line {
    margin-top: 3vh;
    width: 60%;
    height: 1vh;
    background: #D4AF37;
    border-radius: 999px;
  }
  .tag {
    margin-top: 3vh;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 600;
    font-size: 3.5vw;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.9;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">Book A Ride</div>
    <div class="line"></div>
    <div class="tag">Premium Airport Transfers</div>
  </div>
</body>
</html>
