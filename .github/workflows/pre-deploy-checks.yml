name: Pre-Deploy Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  api-checks:
    name: API Serverless Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Node syntax check (all api/*.js files)
        run: |
          echo "=== Parsing all API serverless functions ==="
          find api -name "*.js" -not -path "*/node_modules/*" -print0 | xargs -0 -n1 node --check
          echo "All API serverless functions parse cleanly"

      - name: Banned API patterns
        run: |
          FAILED=0
          grep -rn "pymongo\|MongoClient\|motor\|mongodb://\|MONGO_URL" api/ --include="*.js" | grep -v node_modules && echo "FAIL: MongoDB references" && FAILED=1 || true
          grep -rn "SendGrid\|sendgrid\|nodemailer\|smtplib" api/ --include="*.js" | grep -v node_modules && echo "FAIL: SMTP/SendGrid references" && FAILED=1 || true
          grep -rn "geoapify\|GEOAPIFY" api/ --include="*.js" | grep -v node_modules && echo "FAIL: Geoapify references" && FAILED=1 || true
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "No banned API patterns found"

  frontend-checks:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (must succeed with zero errors)
        working-directory: frontend
        run: npm run build

      - name: Banned frontend imports
        run: |
          grep -rn "@vuer-ai/react-helmet-async" frontend/src/ && echo "FAIL: Broken helmet fork" && exit 1 || true
          grep -rn "airport-shuttle" frontend/src/ --include="*.jsx" --include="*.js" | grep -v "seo\|SEO\|blog\|Blog\|airport-shuttle-\|App\.js\|blogPosts\|data/" && echo "FAIL: Removed service type" && exit 1 || true
          grep -rn "process\.env\.REACT_APP_" frontend/src/ --include="*.jsx" --include="*.js" && echo "FAIL: REACT_APP_ env pattern is banned (use VITE_)" && exit 1 || true
          grep -rn "bookaride-backend\.onrender\.com" frontend/src/ --include="*.jsx" --include="*.js" && echo "FAIL: Dead Render backend URL referenced" && exit 1 || true
          grep -rn "window\.google\.maps\.places\.Autocomplete" frontend/src/ --include="*.jsx" --include="*.js" && echo "FAIL: Native Google Autocomplete widget is banned (see CLAUDE.md section 6c)" && exit 1 || true
          grep -rn "maps\.googleapis\.com/maps/api/js" frontend/src/ --include="*.jsx" --include="*.js" --include="*.html" && echo "FAIL: Google Maps JS loader is banned (use server-side /api/places/autocomplete)" && exit 1 || true
          echo "Frontend imports clean"
