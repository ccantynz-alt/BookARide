name: Pre-Deploy Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    # The Python backend/ folder is gone (CLAUDE.md locked decision 0:
    # frontend-only architecture, Vercel serverless api/). This job now
    # validates the api/ serverless functions. The job name is kept as
    # "Backend Quality" so branch-protection rules pinned to it still match.
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: API serverless syntax check (all .js files)
        run: |
          echo "=== Checking syntax of every api/ serverless function ==="
          find api/ -name "*.js" -not -path "*/node_modules/*" -print0 | xargs -0 -n1 node --check
          echo "All api/ files parse cleanly"

      - name: Banned services check
        run: |
          echo "=== Checking for banned services (CLAUDE.md Forbidden List) ==="
          FAILED=0
          grep -rn --exclude-dir=node_modules "pymongo\|MongoClient\|mongodb://\|MONGO_URL" api/ --include="*.js" && echo "FAIL: MongoDB references — Neon Postgres only" && FAILED=1 || true
          grep -rn --exclude-dir=node_modules "nodemailer\|@sendgrid\|sendgrid\.com" api/ --include="*.js" && echo "FAIL: SMTP/SendGrid references — Mailgun only" && FAILED=1 || true
          grep -rn --exclude-dir=node_modules "geoapify\.com\|GEOAPIFY" api/ --include="*.js" && echo "FAIL: Geoapify references — Google Maps only" && FAILED=1 || true
          grep -rn --exclude-dir=node_modules "onrender\.com" api/ frontend/src/ && echo "FAIL: Dead Render URL referenced — Vercel only" && FAILED=1 || true
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "No banned services found"

  frontend-checks:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # VITE_BACKEND_URL intentionally unset: the default is empty string
      # (same-origin /api/* on Vercel). The old Render URL is banned.
      - name: Build (must succeed with zero errors)
        working-directory: frontend
        run: npm run build

      - name: Banned frontend patterns
        run: |
          FAILED=0
          grep -rn "@vuer-ai/react-helmet-async" frontend/src/ && echo "FAIL: Broken helmet fork — use react-helmet-async" && FAILED=1 || true
          # Only the serviceType VALUE 'airport-shuttle' is banned (CLAUDE.md 9).
          # Marketing route slugs like /auckland-airport-shuttle are allowed —
          # same pattern as .claude/hooks/session-start.sh.
          grep -rnE "serviceType\s*[:=]\s*['\"]airport-shuttle['\"]|service_type\s*[:=]\s*['\"]airport-shuttle['\"]" frontend/src/ --include="*.jsx" --include="*.js" && echo "FAIL: Removed serviceType 'airport-shuttle' used as a value" && FAILED=1 || true
          grep -rn "process\.env\.REACT_APP" frontend/src/ && echo "FAIL: REACT_APP env var — use import.meta.env.VITE_*" && FAILED=1 || true
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "Frontend patterns clean"
