name: Pre-Deploy Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python syntax check (all .py files)
        run: |
          echo "=== Compiling all Python files ==="
          find backend/ -name "*.py" -exec python3 -m py_compile {} \;
          echo "All Python files compile cleanly"

      - name: Smart quote check
        run: |
          python3 -c "
          import glob, sys
          failed = False
          for f in glob.glob('backend/**/*.py', recursive=True):
              content = open(f, encoding='utf-8').read()
              for char, name in [('\u2018','left-sq'), ('\u2019','right-sq'), ('\u201c','left-dq'), ('\u201d','right-dq')]:
                  if char in content:
                      print(f'FAIL: {f} contains {name} smart quote')
                      failed = True
          if failed:
              sys.exit(1)
          print('No smart quotes found')
          "

      - name: Banned imports check
        run: |
          echo "=== Checking for banned imports ==="
          FAILED=0
          grep -rn "pymongo\|MongoClient\|motor\|mongodb://" backend/*.py && echo "FAIL: MongoDB references" && FAILED=1 || true
          grep -rn "SendGrid\|sendgrid\|smtplib\|MIMEMultipart\|MIMEText" backend/*.py && echo "FAIL: SMTP/SendGrid references" && FAILED=1 || true
          grep -rn "geoapify\|GEOAPIFY" backend/*.py && echo "FAIL: Geoapify references" && FAILED=1 || true
          grep -rn "asyncio\.new_event_loop\|asyncio\.run(" backend/server.py && echo "FAIL: Dangerous event loop usage" && FAILED=1 || true
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "No banned imports found"

      - name: Background task safety check
        run: |
          echo "=== Checking background task patterns ==="
          python3 -c "
          content = open('backend/server.py').read()
          if 'asyncio.new_event_loop' in content:
              print('FAIL: asyncio.new_event_loop() found — this breaks background tasks')
              exit(1)
          if 'asyncio.run(' in content:
              print('FAIL: asyncio.run() found — cannot run inside existing event loop')
              exit(1)
          print('Background task patterns are clean')
          "

  frontend-checks:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (must succeed with zero errors)
        working-directory: frontend
        run: npm run build
        env:
          REACT_APP_BACKEND_URL: https://bookaride-backend.onrender.com

      - name: Banned frontend imports
        run: |
          grep -rn "@vuer-ai/react-helmet-async" frontend/src/ && echo "FAIL: Broken helmet fork" && exit 1 || true
          grep -rn "airport-shuttle" frontend/src/ --include="*.jsx" --include="*.js" | grep -v "seo\|SEO\|blog\|Blog\|airport-shuttle-" && echo "FAIL: Removed service type" && exit 1 || true
          echo "Frontend imports clean"
