name: Seed Bookings (1200+)

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of bookings to generate'
        required: false
        default: '1200'
      start_ref:
        description: 'Starting reference number (leave at 10 to auto-detect from DB)'
        required: false
        default: '10'

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install asyncpg

      - name: Run seed script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python backend/seed_bookings.py \
            --database-url "$DATABASE_URL" \
            --count ${{ github.event.inputs.count }} \
            --start-ref ${{ github.event.inputs.start_ref }}
